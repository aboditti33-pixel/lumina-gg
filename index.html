<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | Digital Game Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('هوية الانمي للمتجر(1).png'); /* خلفية المتجر */
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }
        .overlay {
            background-color: rgba(0,0,0,0.65);
            min-height: 100vh;
            padding: 50px 20px;
        }
        .logo {
            width: 200px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            margin: 10px 0;
            color: #b58fff;
        }
        p.subtitle {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .contact {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }
        .contact a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
        }
        .contact img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            width: 200px;
        }
        .feature h3 {
            margin-bottom: 10px;
            color: #b58fff;
        }
        .feature p {
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <!-- شعار المتجر -->
        <img src="https://i.postimg.cc/3xc185Dn/hwyt-alanmy-llmtjr.png" alt="LUMINA Logo" class="logo">

        <!-- العنوان -->
        <h1>LUMINA</h1>
        <p class="subtitle">وجهتك لعالم الألعاب الرقمية</p>

        <!-- روابط التواصل والمتجر -->
        <div class="contact">
            <!-- رابط الانستغرام -->
            <a href="https://www.instagram.com/lumina___l?igsh=eTJ0OXFnZTluNzd2" target="_blank">
                <img src="https://i.postimg.cc/fRDncd2D/de071b53-410b-4bc4-a8c4-07504a2c5ac4.png" alt="Instagram">
                @LUMINA
            </a>
            <!-- رابط WhatsApp -->
            <a href="https://wa.me/0590979464" target="_blank">
                <img src="https://i.postimg.cc/TYrv50cC/f8ef17af-f55d-4a49-9202-a775ccc52ec8.png" alt="WhatsApp">
                0590979464
            </a>
            <!-- رابط المتجر -->
            <a href="https://salla.sa/lumina.gg" target="_blank">
                <img src="https://i.postimg.cc/3xc185Dn/hwyt-alanmy-llmtjr.png" alt="Store">
                زيارة المتجر
            </a>
        </div>

        <!-- المميزات -->
        <div class="features">
            <div class="feature">
                <h3>✅ آمنة 100%</h3>
                <p>ضمان كامل على جميع المنتجات</p>
            </div>
            <div class="feature">
                <h3>⚡ تسليم فوري</h3>
                <p>استلم طلبك في ثوانٍ وبكل سهولة</p>
            </div>
            <div class="feature">
                <h3>🎧 دعم 24/7</h3>
                <p>فريق الدعم متاح على مدار الساعة</p>
            </div>
            <div class="feature">
                <h3>💰 أفضل الأسعار</h3>
                <p>أقوى العروض والخصومات بانتظارك</p>
            </div>
        </div>
    </div>
</body>
</html>
